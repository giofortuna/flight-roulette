<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DISPATCH — Split-Flap Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --card-bg:     #111111;
      --section-bg:  #0e0e0e;
      --tile-bg:     #1b1b1b;
      --tile-border: #0c0c0c;
      --tile-crease: rgba(0, 0, 0, 0.65);
      --text:        #f2ede3;
      --text-dim:    #6a6560;
      --text-sub:    #aaa89e;
      --amber:       #f0b429;
      --amber-dim:   #6a4e10;
      --border:      #1e1e1e;
      --border-soft: #181818;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      font-family: 'Space Mono', monospace;
    }

    /* ── Card wrapper ── */
    .card-wrap {
      width: 100%;
      max-width: 820px;
    }

    /* ── Flight card ── */
    .flight-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Card sections ── */
    .card-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--card-bg);
    }
    .card-section:last-child { border-bottom: none; }
    .card-section.dark { background: var(--section-bg); }

    /* ── Field label ── */
    .field-label {
      font-family: 'Orbitron', monospace;
      font-size: 7px;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    /* ── Flap row ── */
    .flap-row {
      display: flex;
      gap: 2px;
      flex-wrap: wrap;
    }
    .flap-row + .flap-row { margin-top: 4px; }

    /* ── Individual flap tile ── */
    .flap-char {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--tile-bg);
      color: var(--text);
      font-family: Arial, 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      position: relative;
      border: 1px solid var(--tile-border);
      overflow: hidden;
      flex-shrink: 0;
      line-height: 1;
    }

    .flap-char.blank {
      background: transparent;
      border-color: transparent;
    }
    .flap-char.blank::after { display: none; }

    .flap-char.amber {
      color: var(--amber);
      background: #1e1800;
      border-color: #0f0c00;
    }

    .flap-char {
      transition: transform 28ms ease;
    }

    /* Size variants */
    .flap-char.xl {
      width: 38px; height: 54px;
      font-size: 30px;
      letter-spacing: -0.02em;
    }
    .flap-char.lg {
      width: 23px; height: 34px;
      font-size: 18px;
    }
    .flap-char.md {
      width: 16px; height: 25px;
      font-size: 13px;
    }
    .flap-char.sm {
      width: 12px; height: 19px;
      font-size: 11px;
      color: var(--text-sub);
    }

    /* ── Header: airline + flight + sim badge ── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-header-left {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .sim-badge {
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      border: 1px solid #222;
      padding: 4px 9px;
      white-space: nowrap;
      margin-top: 2px;
    }

    /* ── Route section ── */
    .route-section {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
      align-items: center;
    }
    .apt-block { display: flex; flex-direction: column; gap: 6px; }
    .apt-block.right { align-items: flex-end; }
    .apt-block.right .flap-row { justify-content: flex-end; }

    .route-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }
    .r-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .r-line { width: 1px; height: 16px; background: #222; }
    .r-plane { font-size: 16px; color: #2e2e2e; }

    /* ── Stats row (aircraft / pax / cargo) ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
    }
    .stat-cell {
      padding: 14px 16px;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }

    /* ── Footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      background: var(--section-bg);
      border-top: 1px solid var(--border);
    }
    .footer-note {
      font-size: 8px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      font-family: 'Orbitron', monospace;
    }
    .btn-dispatch {
      background: none;
      border: 1px solid #2a2010;
      color: var(--amber-dim);
      font-family: 'Orbitron', monospace;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 7px 13px;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-dispatch:hover {
      border-color: var(--amber-dim);
      color: var(--amber);
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 14px;
    }
    .btn-regen {
      background: none;
      border: 1px solid #1e1e1e;
      color: #2e2e2e;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 7px 18px;
      cursor: pointer;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-regen:hover { border-color: #333; color: #555; }
    .flight-counter { font-size: 9px; color: #222; letter-spacing: 0.1em; }
  </style>
</head>
<body>

<div class="card-wrap">
  <div class="flight-card">

    <!-- ── Header: flight number + airline + STD ── -->
    <div class="card-section">
      <div class="card-header">
        <div class="card-header-left">
          <div>
            <div class="field-label">Flight</div>
            <div class="flap-row" id="f-fltnum"></div>
          </div>
          <div>
            <div class="field-label">Airline</div>
            <div class="flap-row" id="f-airline"></div>
          </div>
        </div>
        <div>
          <div class="field-label" style="text-align:right;">STD</div>
          <div class="flap-row" id="f-std"></div>
        </div>
      </div>
    </div>

    <!-- ── Route: dep → dest ── -->
    <div class="card-section dark">
      <div class="route-section">
        <div class="apt-block">
          <div class="field-label">From</div>
          <div class="flap-row" id="f-dep-icao"></div>
          <div class="flap-row" id="f-dep-name"></div>
          <div class="flap-row" id="f-dep-city"></div>
          <div class="flap-row" id="f-dep-country"></div>
        </div>

        <div class="route-mid">
          <div class="r-stat">
            <div class="field-label">Dist</div>
            <div class="flap-row" id="f-distance"></div>
          </div>
          <div class="r-line"></div>
          <div class="r-plane">✈</div>
          <div class="r-line"></div>
          <div class="r-stat">
            <div class="flap-row" id="f-blocktime"></div>
            <div class="field-label" style="margin-top:5px;margin-bottom:0;">Block</div>
          </div>
        </div>

        <div class="apt-block right">
          <div class="field-label" style="text-align:right;">To</div>
          <div class="flap-row" id="f-dest-icao"></div>
          <div class="flap-row" id="f-dest-name"></div>
          <div class="flap-row" id="f-dest-city"></div>
          <div class="flap-row" id="f-dest-country"></div>
        </div>
      </div>
    </div>

    <!-- ── Aircraft / Pax / Cargo ── -->
    <div class="stats-row">
      <div class="stat-cell">
        <div class="field-label">Aircraft</div>
        <div class="flap-row" id="f-actype"></div>
        <div class="flap-row" id="f-acframe"></div>
      </div>
      <div class="stat-cell">
        <div class="field-label">Pax</div>
        <div class="flap-row" id="f-pax"></div>
        <div class="flap-row" id="f-pax-max"></div>
      </div>
      <div class="stat-cell">
        <div class="field-label">Cargo</div>
        <div class="flap-row" id="f-cargo"></div>
        <div class="flap-row" id="f-cargo-max"></div>
      </div>
    </div>

    <!-- ── Footer ── -->
    <div class="card-footer">
      <div class="footer-note">Fuel · Routing · Weather via SimBrief</div>
      <a class="btn-dispatch" href="#" target="_blank">Dispatch to SimBrief →</a>
    </div>

  </div><!-- /.flight-card -->
</div><!-- /.card-wrap -->

<div class="controls">
  <button class="btn-regen" id="btn-next">↺ Next Flight</button>
  <div class="flight-counter" id="counter">1 / 3</div>
</div>

<script>
  const FLIGHTS = [
    {
      sim:         'MSFS 2024',
      airline:     'BRITISH AIRWAYS',
      fltnum:      'BAW442',
      stdUtc:      { h: 13, m: 25 },
      depIcao:     'EGLL',
      depName:     'LONDON-HEATHROW',
      depCity:     'LONDON',
      depCountry:  'UNITED KINGDOM',
      destIcao:    'EHAM',
      destName:    'AMSTERDAM SCHIPHOL',
      destCity:    'AMSTERDAM',
      destCountry: 'NETHERLANDS',
      distance:    '231NM',
      block:       '01+07BLK',
      acType:      'A320',
      acFrame:     'FENIX A320 SHARKLET CFM',
      pax:         '142',
      paxMax:      '/180 MAX',
      cargo:       '4,200KG',
      cargoMax:    '/20,000 MAX',
    },
    {
      sim:         'MSFS 2020',
      airline:     'LUFTHANSA',
      fltnum:      'DLH419',
      stdUtc:      { h: 6, m: 40 },
      depIcao:     'EDDF',
      depName:     'FRANKFURT AM MAIN',
      depCity:     'FRANKFURT',
      depCountry:  'GERMANY',
      destIcao:    'OMDB',
      destName:    'DUBAI INTL',
      destCity:    'DUBAI',
      destCountry: 'UNITED ARAB EMIRATES',
      distance:    '2931NM',
      block:       '07+22BLK',
      acType:      'B738',
      acFrame:     'PMDG 737-800',
      pax:         '158',
      paxMax:      '/162 MAX',
      cargo:       '9,800KG',
      cargoMax:    '/20,000 MAX',
    },
    {
      sim:         'MSFS 2024',
      airline:     'QANTAS',
      fltnum:      'QFA011',
      stdUtc:      { h: 21, m: 10 },
      depIcao:     'YSSY',
      depName:     'SYDNEY KINGSFORD SMITH',
      depCity:     'SYDNEY',
      depCountry:  'AUSTRALIA',
      destIcao:    'NZAA',
      destName:    'AUCKLAND INTL',
      destCity:    'AUCKLAND',
      destCountry: 'NEW ZEALAND',
      distance:    '1337NM',
      block:       '03+44BLK',
      acType:      'B738',
      acFrame:     'PMDG 737-800',
      pax:         '89',
      paxMax:      '/162 MAX',
      cargo:       '2,150KG',
      cargoMax:    '/20,000 MAX',
    },
  ];

  const CHARS        = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/-+:,.';
  const CYCLE_MS     = 55;   // interval between character flips
  const TILE_STAGGER = 38;   // ms delay added per tile index within a field
  const FIELD_STAGGER = 75;  // ms delay added per field index

  let current = 0;
  let animating = false;

  function randChar() {
    return CHARS[Math.floor(Math.random() * CHARS.length)];
  }

  function wordGap(size) {
    return `display:inline-flex;width:${size==='xl'?10:size==='lg'?7:size==='md'?5:4}px;flex-shrink:0;`;
  }

  // Build DOM tiles and return an array of {span, finalChar} for char tiles only
  function buildTiles(el, text, size, amber) {
    el.innerHTML = '';
    const targets = [];
    for (const word of String(text).split(' ')) {
      const group = document.createElement('span');
      group.style.cssText = 'display:inline-flex;gap:2px;flex-shrink:0;';
      for (const ch of word) {
        const s = document.createElement('span');
        s.className = `flap-char ${size}${amber ? ' amber' : ''}`;
        s.textContent = randChar();
        group.appendChild(s);
        targets.push({ span: s, final: ch.toUpperCase() });
      }
      el.appendChild(group);
      const sp = document.createElement('span');
      sp.style.cssText = wordGap(size);
      el.appendChild(sp);
    }
    if (el.lastChild) el.removeChild(el.lastChild);
    return targets;
  }

  // Animate one tile: cycle random chars then lock on finalChar
  function animateTile(span, finalChar, startDelay) {
    return new Promise(resolve => {
      setTimeout(() => {
        const cycles = 7 + Math.floor(Math.random() * 6);
        let count = 0;
        const tick = setInterval(() => {
          span.style.transform = 'scaleY(0.82)';
          setTimeout(() => { span.style.transform = ''; }, 22);
          count++;
          if (count >= cycles) {
            clearInterval(tick);
            span.textContent = finalChar;
            resolve();
          } else {
            span.textContent = randChar();
          }
        }, CYCLE_MS);
      }, startDelay);
    });
  }

  // Build tiles in random state, then animate to final text
  function animateFlaps(id, text, size, amber, fieldDelay) {
    const el = document.getElementById(id);
    if (!el) return Promise.resolve();
    const targets = buildTiles(el, text, size, amber);
    return Promise.all(
      targets.map(({ span, final }, i) =>
        animateTile(span, final, fieldDelay + i * TILE_STAGGER)
      )
    );
  }

  // Instant render (no animation) — used for initial paint
  function setFlaps(id, text, size, amber = false) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    for (const word of String(text).split(' ')) {
      const group = document.createElement('span');
      group.style.cssText = 'display:inline-flex;gap:2px;flex-shrink:0;';
      for (const ch of word) {
        const s = document.createElement('span');
        s.className = `flap-char ${size}${amber ? ' amber' : ''}`;
        s.textContent = ch.toUpperCase();
        group.appendChild(s);
      }
      el.appendChild(group);
      const sp = document.createElement('span');
      sp.style.cssText = wordGap(size);
      el.appendChild(sp);
    }
    if (el.lastChild) el.removeChild(el.lastChild);
  }

  function localTime(utc) {
    const d = new Date();
    d.setUTCHours(utc.h, utc.m, 0, 0);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function render(f, animate) {
    const lt = localTime(f.stdUtc);

    // Field order determines stagger sequence
    const fields = [
      { id: 'f-fltnum',       text: f.fltnum,      size: 'md', amber: false },
      { id: 'f-airline',      text: f.airline,     size: 'md', amber: false },
      { id: 'f-std',          text: lt,            size: 'lg', amber: true  },
      { id: 'f-dep-icao',     text: f.depIcao,     size: 'xl', amber: false },
      { id: 'f-dep-name',     text: f.depName,     size: 'sm', amber: false },
      { id: 'f-dep-city',     text: f.depCity,     size: 'sm', amber: false },
      { id: 'f-dep-country',  text: f.depCountry,  size: 'sm', amber: false },
      { id: 'f-dest-icao',    text: f.destIcao,    size: 'xl', amber: false },
      { id: 'f-dest-name',    text: f.destName,    size: 'sm', amber: false },
      { id: 'f-dest-city',    text: f.destCity,    size: 'sm', amber: false },
      { id: 'f-dest-country', text: f.destCountry, size: 'sm', amber: false },
      { id: 'f-distance',     text: f.distance,    size: 'md', amber: false },
      { id: 'f-blocktime',    text: f.block,       size: 'md', amber: false },
      { id: 'f-actype',       text: f.acType,      size: 'lg', amber: false },
      { id: 'f-acframe',      text: f.acFrame,     size: 'sm', amber: false },
      { id: 'f-pax',          text: f.pax,         size: 'lg', amber: false },
      { id: 'f-pax-max',      text: f.paxMax,      size: 'sm', amber: false },
      { id: 'f-cargo',        text: f.cargo,       size: 'lg', amber: false },
      { id: 'f-cargo-max',    text: f.cargoMax,    size: 'sm', amber: false },
    ];

    if (animate) {
      fields.forEach(({ id, text, size, amber }, fi) =>
        animateFlaps(id, text, size, amber, fi * FIELD_STAGGER)
      );
    } else {
      fields.forEach(({ id, text, size, amber }) => setFlaps(id, text, size, amber));
    }

    document.getElementById('counter').textContent = `${current + 1} / ${FLIGHTS.length}`;
  }

  document.getElementById('btn-next').addEventListener('click', () => {
    if (animating) return;
    animating = true;
    current = (current + 1) % FLIGHTS.length;
    render(FLIGHTS[current], true);
    // conservative estimate: longest field delay + cycling time
    setTimeout(() => { animating = false; }, FLIGHTS[current].acFrame.length * TILE_STAGGER + 19 * FIELD_STAGGER + CYCLE_MS * 13);
  });

  // Initial paint — no animation
  render(FLIGHTS[0], false);
</script>
</body>
</html>
